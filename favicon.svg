<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fond carré arrondi -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>
  <!-- Lettre S -->
  <text x="4" y="22" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#D4A373" letter-spacing="-0.5">S</text>
  <!-- Lettre F -->
  <text x="16" y="22" font-family="Georgia, serif" font-size="14" font-weight="700" fill="white" letter-spacing="-0.5">F</text>
  <!-- Trait doré en bas -->
  <rect x="4" y="25" width="24" height="1.5" rx="0.75" fill="#D4A373" opacity="0.6"/>
</svg>
